name: CI/CD Pipeline - Blue-Green Automation

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: owendev1099/debops
  # Carpeta donde ya tienes tus archivos (Dockerfile, template, etc.)
  WORKDIR: /home/${{ secrets.SERVER_USER }}/DebOps 

jobs:
  # 1. ANÁLISIS DE CALIDAD (SonarQube)
  quality-analysis:
    name: Análisis SAST (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-debops
            -Dsonar.sources=.

  # 2. PRUEBA DE RENDIMIENTO (k6)
  performance-test:
    name: Pruebas de Carga (k6)
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: script_k6.js

  # 3. CONSTRUCCIÓN DE IMAGEN
  build-and-push:
    name: Build y Push a GHCR
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # 4. DESPLIEGUE AUTOMATIZADO CON LÓGICA DE INVERSIÓN
  deploy:
    name: Deploy to Production & Switch Traffic
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.WORKDIR }}

            # 1. MECANISMO DE PERSISTENCIA
            # Leemos el archivo para saber quién está productivo
            if [ -f current_deploy.env ]; then
              source current_deploy.env
            else
              # Si el archivo no existe, asumimos que el actual es blue para empezar
              CURRENT_COLOR="blue"
            fi

            # 2. LÓGICA DE INVERSIÓN
            # Si el actual es Blue, vamos hacia Green. Si es Green, vamos a Blue.
            if [ "$CURRENT_COLOR" == "blue" ]; then
              TARGET_COLOR="green"
              TARGET_IP="192.168.1.20"
              TARGET_PORT="8081"
            else
              TARGET_COLOR="blue"
              TARGET_IP="127.0.0.1"
              TARGET_PORT="3000"
            fi

            echo ">>> Entorno actual: $CURRENT_COLOR"
            echo ">>> Desplegando y moviendo tráfico hacia: $TARGET_COLOR ($TARGET_IP:$TARGET_PORT)"

            # 3. ACTUALIZACIÓN DEL CONTENEDOR (Opcional si usas Docker)
            # Aquí podrías levantar el contenedor del color destino si fuera necesario
            # docker compose pull && docker compose up -d

            # 4. SUSTITUCIÓN AUTOMÁTICA (envsubst)
            # Inyectamos las variables de decisión en la plantilla de Nginx
            export APP_TARGET_IP=$TARGET_IP
            export APP_TARGET_PORT=$TARGET_PORT
            export DEPLOYMENT_COLOR=$TARGET_COLOR

            envsubst '${APP_TARGET_IP} ${APP_TARGET_PORT} ${DEPLOYMENT_COLOR}' < nginx.conf.template > default.conf
            
            # 5. VALIDACIÓN Y RECARGA DE NGINX
            sudo mv default.conf /etc/nginx/conf.d/default.conf
            sudo nginx -t && sudo systemctl reload nginx

            # 6. ACTUALIZAR EL ESTADO PARA EL PRÓXIMO DESPLIEGUE
            echo "CURRENT_COLOR=$TARGET_COLOR" > current_deploy.env
            
            echo ">>> PROCESO FINALIZADO: El tráfico ahora está en $TARGET_COLOR"
