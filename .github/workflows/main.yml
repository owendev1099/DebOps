name: CI/CD Pipeline - Sonar, k6, Docker & Deploy

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: owendev1099/debops
  WORKDIR: /home/${{ secrets.SERVER_USER }}/app-monitoring # Carpeta donde vivirá el proyecto en la VM

jobs:
  # 1. ANÁLISIS DE CALIDAD
  quality-analysis:
    name: Análisis SAST (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-debops
            -Dsonar.sources=.

  # 2. PRUEBA DE RENDIMIENTO
  performance-test:
    name: Pruebas de Carga (k6)
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: script_k6.js

  # 3. CONSTRUCCIÓN DE IMAGEN
  build-and-push:
    name: Build y Push a GHCR
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # 4. DESPLIEGUE AUTOMATIZADO
  deploy:
    name: Deploy to Production VM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Login en el registro desde la VM
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Crear carpeta de trabajo si no existe
            mkdir -p ${{ env.WORKDIR }}
            cd ${{ env.WORKDIR }}

            # 3. Descargar solo los archivos de configuración necesarios del repo
            # Esto evita clonar todo el código fuente en producción
            curl -O https://raw.githubusercontent.com/owendev1099/DebOps/main/docker-compose.yml
            curl -O https://raw.githubusercontent.com/owendev1099/DebOps/main/prometheus.yml

            # 4. Actualizar imagen y reiniciar servicios
            docker compose pull
            docker compose up -d --remove-orphans
            
            # 5. Limpieza de imágenes huérfanas
            docker image prune -f
