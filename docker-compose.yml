version: '3.8'

services:
  # 1. Tu Aplicación Node.js (Usando la imagen del registro)
  app-node:
    image: ghcr.io/owendev1099/debops:latest
    container_name: app-node
    restart: always
    ports:
      - "3000:3000"
    # Añadimos salud del contenedor (opcional pero recomendado)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 2. Node Exporter (Métricas del Host)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"

  # 3. Prometheus (Base de datos de tiempo real)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # Es recomendable persistir los datos para no perder métricas al reiniciar
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # 4. Grafana (Visualización)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

# Volúmenes persistentes
volumes:
  prometheus_data:
  grafana_data: